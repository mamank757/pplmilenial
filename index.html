<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penyuluh Milenial Wajo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg: #020617;
    --card: rgba(15, 23, 42, 0.6);
    --primary: #38bdf8;
    --text: #e2e8f0;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background: radial-gradient(circle at top, #0f172a, #020617);
    overflow-x: hidden;
}

/* 🌌 Background Glow */
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #38bdf833, transparent);
    top: -200px;
    right: -200px;
    filter: blur(120px);
}

/* HEADER */
header {
    text-align: center;
    padding: 40px 20px 20px;
}

header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    background: linear-gradient(to right, #fff, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header p {
    color: #94a3b8;
    font-size: 0.9rem;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    max-width: 1000px;
    margin: 30px auto;
    padding: 0 15px;
}

/* CARD */
.card {
    background: var(--card);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 25px 15px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
}

/* glow hover */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: linear-gradient(120deg, transparent, #38bdf855, transparent);
    opacity: 0;
    transition: 0.3s;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: #38bdf8;
    box-shadow: 0 0 25px #38bdf844;
}

/* ICON */
.card i {
    font-size: 2rem;
    color: var(--primary);
    margin-bottom: 10px;
    text-shadow: 0 0 10px #38bdf8aa;
}

/* TEXT */
.card span {
    font-size: 0.95rem;
    font-weight: 500;
}

/* MOBILE MODE */
@media(max-width:600px){
    .card {
        display: flex;
        align-items: center;
        text-align: left;
        padding: 15px;
    }

    .card i {
        margin: 0 15px 0 0;
        font-size: 1.5rem;
    }
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px 20px;
    color: #64748b;
    font-size: 0.8rem;
}
</style>
</head>

<body>

<header>
    <h1>Penyuluh Milenial Wajo</h1>
    <p>Digitalisasi Penyuluh Pertanian Masa Depan</p>
</header>

<div class="grid">

<i class="fas fa-file-signature"></i>
<span>Eviden LCS</span>
</a>

</a>
